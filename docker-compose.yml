services:
  psicologo:
    build:
      context: .
      target: production
    image: psicologo:latest
    container_name: psicologo-app
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped

  psicologo-dev:
    profiles: [dev]
    build:
      context: .
      target: development
    image: psicologo:dev
    container_name: psicologo-dev
    ports:
      - "${DEV_PORT:-4200}:4200"
    volumes:
      - .:/app
      - psicologo_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: ["pnpm", "exec", "ng", "serve", "--host", "0.0.0.0", "--port", "4200", "--poll", "2000"]

volumes:
  psicologo_node_modules:
